# LocoBox scene — primitive cube box on a ``cube`` ground (no flat plane).
# Aligned with ``squat_grasp_env`` (the bottle-on-floor sibling): same
# ground geometry/material, same lighting/background, just a different
# target object (primitive cube instead of a USD bottle) and box mass /
# friction profile suited to the squeeze.

room:
  # No room/desk — cube on floor.

background:
  intensity: [1000, 2000]
  texture: [
    "$MAGICSIM_ASSETS/Background/champagne_castle_1_4k.hdr",
    "$MAGICSIM_ASSETS/Background/evening_road_01_4k.hdr",
    "$MAGICSIM_ASSETS/Background/kloofendal_48d_partly_cloudy_4k.hdr",
    "$MAGICSIM_ASSETS/Background/kloppenheim_02_4k.hdr",
    "$MAGICSIM_ASSETS/Background/mealie_road_4k.hdr",
    "$MAGICSIM_ASSETS/Background/moonlit_golf_4k.hdr",
    "$MAGICSIM_ASSETS/Background/noon_grass_4k.hdr",
    "$MAGICSIM_ASSETS/Background/qwantani_4k.hdr"
  ]

ground:
  geometry: "cube"
  thickness: 0.02
  materials:
    - type: mdl
      mdl_path: "$MAGICSIM_ASSETS/Material/Base/Textiles/"
  physics_material:
    static_friction: 0.5
    dynamic_friction: 0.5
    restitution: 0.0
    friction_combine_mode: "average"
    restitution_combine_mode: "average"
    compliant_contact_stiffness: 0.0
    compliant_contact_damping: 0.0
  scale: 0.8

light:
  light_1:
    types: ["Rect", "Sphere", "Cylinder"]
    common:
      initial_pos_range: [-0.2, -0.2, 0, 0.2, 0.5, 0]
      initial_ori_range: [-30, -30, -30, 30, 30, 30]
      color_temperature_range: [3000, 9000]
      color_range: [[0.8, 0.8, 0.8], [1.2, 1.2, 1.2]]
    Dome:
      intensity_range: [800, 1500]
    Rect:
      intensity_range: [2000, 5000]
      width_range: [1.0, 3.0]
      height_range: [1.0, 3.0]
    Distant:
      intensity_range: [2000, 5000]
      angle_range: [0.5, 2.0]
    Sphere:
      intensity_range: [5000, 10000]
      radius_range: [0.1, 0.5]
    Cylinder:
      intensity_range: [4000, 8000]
      radius_range: [0.1, 0.3]
      length_range: [1.0, 2.0]
    Disk:
      intensity_range: [6000, 12000]
      radius_range: [0.2, 0.8]

  light_2:
    types: ["Rect", "Sphere", "Cylinder"]
    common:
      initial_pos_range: [-0.2, -0.2, 0, 0.2, 0.5, 0]
      initial_ori_range: [-30, -30, -30, 30, 30, 30]
      color_temperature_range: [3000, 9000]
      color_range: [[0.8, 0.8, 0.8], [1.2, 1.2, 1.2]]
    Dome:
      intensity_range: [800, 1500]
      radius_range: [8.0, 12.0]
    Rect:
      intensity_range: [2000, 5000]
      width_range: [1.0, 3.0]
      height_range: [1.0, 3.0]
    Distant:
      intensity_range: [2000, 5000]
      angle_range: [0.5, 2.0]
    Sphere:
      intensity_range: [5000, 10000]
      radius_range: [0.1, 0.5]
    Cylinder:
      intensity_range: [4000, 8000]
      radius_range: [0.1, 0.3]
      length_range: [1.0, 2.0]

objects:
  common:
    initial_pos_range: [0.0, 0.0, 0.13, 0.0, 0.0, 0.13]
    initial_ori_range: [0, 0, 0, 0, 0, 0]
    scale: [1.0, 1.0, 1.0]

  # Primitive Cube — the box. Spawned in front of the robot, settled on the
  # cube ground. Cube primitive size = 1m × ``primitive_scale``; with 0.25
  # scale the half-extent is 0.125, so z=0.13 sits the cube right on the
  # ground.
  #
  # Domain randomization aligned with squat_grasp_env (bottle on floor):
  # x ∈ [-0.2, 0.2] (in front of the robot ±20 cm),
  # y ∈ [-0.7, 0.7] (lateral ±70 cm — matches squat bottle range).
  bin:
    common:
      initial_pos_range: [-0.2, -0.7, 0.13, 0.2, 0.7, 0.13]
      initial_ori_range: [0, 0, 0, 0, 0, 0]
      primitive_scale: [0.25, 0.25, 0.25]
      scale: [0.25, 0.25, 0.25]
    usd: ["Cube"]                # ``Cube`` triggers CubeMesh primitive spawn
    num_per_env: 1
    random: True
    default_material: False
    bin_1:
      visual:
        scale: [0.25, 0.25, 0.25]
        color:
          - [0.7, 0.5, 0.3]
          - [0.5, 0.4, 0.2]
          - [0.3, 0.2, 0.1]
      physics:
        type: "dynamic"
        collision: true
        mass: 0.5
        physics_material:
          static_friction: 30
          dynamic_friction: 30
          restitution: 0.1
