      # Fixed position (floating red cube)
      initial_pos_range: [-0.5, -0.15, 0.8, -0.5, -0.15, 0.8]
      # Initial orientation range
      initial_ori_range: [0, 0, 0, 0, 0, 0]
      scale: [0.05, 0.05, 0.05]
    usd: ["Cube"] # .usd => add reference to stage /// primitive => create
    num_per_env: 1
    random: False
    semantic_label:

    cube_1:
      visual:
        scale:
        visible:
        color: [1.0, 0.0, 0.0]
        size:
        visual_material:
          material_usd_folder:

      physics:
        type: "geometry" # dynamic, geometry
        mass:
        density:
        physics_material:
          static_friction:
          dynamic_friction:
          restitution:
        linear_velocity:
        angular_velocity:
        collision: False
        track_contact_forces:
        prepare_contact_sensor:
        disable_stablization:
        contact_filter_prim_paths_expr:


