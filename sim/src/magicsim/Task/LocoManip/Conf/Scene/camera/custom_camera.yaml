  #   mount_link: "Robot_0/head_link"
  camera:
    type: camera
    mesh: pinhole
    resolution: [640, 480]
    focal_length: 1.88
    focus_distance: 0.5
    horizontal_aperture: 2.6035
    vertical_aperture: 1.4621
    clipping_range: [0.1, 20.0]
    mount_link: "Robot_0/d435_link"
    pos: [0.0, 0.0, 0.0]
    ori: [90, -90.0, 0.0]
    frequency: 50


    random: # randomization parameters
      pos:
        min: [0, 0, 0]
        max: [0, 0, 0]
      ori:
        min: [0, 0, 0]
        max: [0, 0, 0]

    action_noise:
      pos:
        min: [0, 0, 0]
        max: [0, 0, 0]
      ori:
        min: [0, 0, 0]
        max: [0, 0, 0]
  annotator:
    enabled: True
    rgb_capture:
      type: rgb
      device: cpu
