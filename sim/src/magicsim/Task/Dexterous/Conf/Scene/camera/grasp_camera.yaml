enable_tiled: True
colorize_depth: True
camera0:
  camera:
    type: camera
    mesh: kinect
    # clipping_range: [0.1, 5]
    resolution: [512, 512]  # Reduced from 512x512 to save GPU memory (4x reduction)
    frequency: 30
    focal_length: 0.05
    focus_distance: 10
    mode: RGB
    pos: [1.5, -1 ,1.5]
    ori: [0,0,45]

    random: # randomization parameters
      pos:
        min: [0, 0, 0]
        max: [0, 0, 0]
      ori:
        min: [0, 0, 0]
        max: [0, 0, 0]

    action_noise:
      pos:
        min: [0, 0, 0]
        max: [0, 0, 0]
      ori:
        min: [0, 0, 0]
        max: [0, 0, 0]

  planner:
    type: "gimbal"  # or "linear"
    params:
      pos_stiffness: 20.0
      pos_damping: 8.0
      rot_stiffness: 10.0
      rot_damping: 4.0
      dt: 0.0167  # 60 Hz
      pos_target_threshold: 0.05
      rot_target_threshold_deg: 2.0
      # steps: 200
      # pos_threshold: 0.001
      # rot_threshold_deg: 1.0
  annotator:
    enabled: True
    rgb_capture:
      type: rgb
      device: cpu
    # rgb_capture1:
    #   type: rgb
    #   device: cuda
    # normals_capture:
    #   type: normals
    #   device: cpu
    # normals_capture1:
    #   type: normals
    #   device: cuda
    # distance_to_camera_capture:
    #   type: distance_to_camera
    #   device: cpu
    # distance_to_camera_capture1:
    #   type: distance_to_camera
    #   device: cuda
    distance_to_image_plane_capture:
      type: distance_to_image_plane
      device: cpu
