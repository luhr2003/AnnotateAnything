room:
  # Bimanual dex-grasp scene for vega1pSharpa parked. Layout mirrors
  # ``loco_bi_grasp_env``: low table at world origin with a paired-grasp
  # asset (``/home/magics/sharpa_bimanual``) sitting on top.

background:
  intensity: [1000, 2000]
  texture: [
    "$MAGICSIM_ASSETS/Background/champagne_castle_1_4k.hdr",
    "$MAGICSIM_ASSETS/Background/evening_road_01_4k.hdr",
    "$MAGICSIM_ASSETS/Background/kloofendal_48d_partly_cloudy_4k.hdr",
    "$MAGICSIM_ASSETS/Background/kloppenheim_02_4k.hdr",
    "$MAGICSIM_ASSETS/Background/mealie_road_4k.hdr",
    "$MAGICSIM_ASSETS/Background/moonlit_golf_4k.hdr",
    "$MAGICSIM_ASSETS/Background/noon_grass_4k.hdr",
    "$MAGICSIM_ASSETS/Background/qwantani_4k.hdr"
  ]

light:
  light_1:
    types: ["Rect", "Sphere", "Cylinder"]
    common:
      initial_pos_range: [-0.2, -0.2, 0, 0.2, 0.5, 0]
      initial_ori_range: [-30, -30, -30, 30, 30, 30]
      color_temperature_range: [3000, 9000]
      color_range: [[0.8, 0.8, 0.8], [1.2, 1.2, 1.2]]
    Rect:
      intensity_range: [2000, 5000]
      width_range: [1.0, 3.0]
      height_range: [1.0, 3.0]
    Sphere:
      intensity_range: [5000, 10000]
      radius_range: [0.1, 0.5]
    Cylinder:
      intensity_range: [4000, 8000]
      radius_range: [0.1, 0.3]
      length_range: [1.0, 2.0]

objects:
  common:
    initial_pos_range: [-0.2, -0.2, 0.5, 0.2, 0.5, 0.8]
    initial_ori_range: [0, 0, 0, 0, 0, 0]
    scale: [1.0, 1.0, 1.0]

  # Low table: same scale as loco_bi_grasp so the bin lands within reach.
  simple_desk:
    usd: [
      "$MAGICSIM_ASSETS/Desk/Collected_cline/cline_inst_base.usd",
    ]
    random: true
    num_per_env: 1
    default_material: True
    simple_desk_1:
      pos: [0.0, 0.0, 0.0]
      ori: [0.0, 0.0, 0.0]
      visual:
        scale: [1, 1, 0.7]
        color:
          - [0.8, 0.7, 0.6]
          - [0.6, 0.5, 0.4]
          - [0.4, 0.3, 0.2]
          - [0.2, 0.1, 0.0]
        visual_material:
          material_usd_folder: "$MAGICSIM_ASSETS/Material/Garment"
      physics:
        type: "geometry"
        collision: true

  # Sharpa-annotated paired-grasp bin. The paired-grasp annotation file
  # (``sharpa_dex_grasp_pose.json``) lives next to ``Object.usd`` and is
  # loaded directly by :class:`BiDexGraspEnv` (NOT scanned by the standard
  # ``Annotation/`` folder loader). Position fixed so the parked vega base
  # can reach it with both arms; scale must be unit (annotation positions
  # are in unscaled object-local frame).
  bin:
    common:
      # Randomize the bin landing site within an area both vega arms can
      # reach: ±5cm in x (depth into table), ±8cm in y (left/right between
      # the two arms' reach envelopes), z fixed (drop height). Yaw stays
      # at 90° ± small jitter so the paired R/L grasp annotation still
      # lines up with the body's left/right axis after world transform.
      initial_pos_range: [-0.30, -0.2, 0.85, -0.20, 0.2, 0.85]
      initial_ori_range: [0, 0, 80, 0, 0, 100]
      scale: [1.0, 1.0, 1.0]
    usd: [
      "/home/magics/sharpa_bimanual",
    ]
    num_per_env: 1
    random: True
    default_material: False
    bin_1:
      visual:
        scale: [1.0, 1.0, 1.0]
        color:
          - [0.8, 0.7, 0.6]
          - [0.6, 0.5, 0.4]
          - [0.4, 0.3, 0.2]
          - [0.2, 0.1, 0.0]
      physics:
        type: "dynamic"
        collision: true
        mass: 0.1
        physics_material:
          static_friction: 10
          dynamic_friction: 10
          restitution: 0.5
