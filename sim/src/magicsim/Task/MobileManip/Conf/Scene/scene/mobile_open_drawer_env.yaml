light:
  light_1:
    types: ["Rect", "Sphere", "Cylinder"]
    common:
      initial_pos_range: [-0.2, -0.2, 0, 0.2, 0.5, 0]
      initial_ori_range: [-30, -30, -30, 30, 30, 30]
      color_temperature_range: [3000, 9000]
      color_range: [[0.8, 0.8, 0.8], [1.2, 1.2, 1.2]]
    Rect:
      intensity_range: [2000, 5000]
      width_range: [1.0, 3.0]
      height_range: [1.0, 3.0]
    Sphere:
      intensity_range: [5000, 10000]
      radius_range: [0.1, 0.5]
    Cylinder:
      intensity_range: [4000, 8000]
      radius_range: [0.1, 0.3]
      length_range: [1.0, 2.0]

# A short desk holds the cabinet at a height the ridgebackFranka arm can reach.
# Cabinet sits on top of the desk; ridgebackFranka approaches from -x (faces +x).
objects:
  simple_desk:
    usd: [
      "$MAGICSIM_ASSETS/Desk/Collected_cline/cline_inst_base.usd",
    ]
    random: false
    num_per_env: 1
    default_material: true
    simple_desk_1:
      pos: [1.0, 0.0, 0.0]
      ori: [0.0, 0.0, 0.0]
      visual:
        scale: [0.5, 0.5, 0.35]
        color:
          - [0.6, 0.5, 0.4]
      physics:
        type: "geometry"
        collision: true

  articulation_items:
    common:
      initial_pos_range: [1, 0.0, 0.75, 1, 0.0, 0.75]
      initial_ori_range: [0, 0, 0, 0, 0, 0]
      scale: [1, 1, 1]
