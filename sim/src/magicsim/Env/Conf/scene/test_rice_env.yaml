# Environment configuration
num_envs: 4
env_offset: [1.0, 1.0, 0.0]

room:
  hide_top_walls: true
  simple_room:
    usd: ["$MAGICSIM_ASSETS/Room/Collected_SimpleRoom"]
    random: True
    simple_room_1:
      pos: [0.0, 0.0, 0.8]
      ori: [0.0, 0.0, 0]

background:
  intensity: [1000, 2000]
  texture: [
    "$MAGICSIM_ASSETS/Background/champagne_castle_1_4k.hdr",
    "$MAGICSIM_ASSETS/Background/evening_road_01_4k.hdr",
    "$MAGICSIM_ASSETS/Background/kloofendal_48d_partly_cloudy_4k.hdr",
    "$MAGICSIM_ASSETS/Background/kloppenheim_02_4k.hdr",
    "$MAGICSIM_ASSETS/Background/mealie_road_4k.hdr",
    "$MAGICSIM_ASSETS/Background/moonlit_golf_4k.hdr",
    "$MAGICSIM_ASSETS/Background/noon_grass_4k.hdr",
    "$MAGICSIM_ASSETS/Background/qwantani_4k.hdr"
  ]

light:
  light_1:
    types: ["Rect", "Sphere", "Cylinder"]
    common:
      initial_pos_range: [-0.2, -0.2, 0, 0.2, 0.5, 0]
      initial_ori_range: [-30, -30, -30, 30, 30, 30]
      color_temperature_range: [3000, 9000]
      color_range: [[0.8, 0.8, 0.8], [1.2, 1.2, 1.2]]
    Rect:
      intensity_range: [2000, 5000]
      width_range: [1.0, 3.0]
      height_range: [1.0, 3.0]
    Sphere:
      intensity_range: [5000, 10000]
      radius_range: [0.1, 0.5]
    Cylinder:
      intensity_range: [4000, 8000]
      radius_range: [0.1, 0.3]
      length_range: [1.0, 2.0]


objects:
  common:
    initial_pos_range: [-0.8, -0.8, 1.0, 0.8, 0.8, 1.0]
    initial_ori_range: [0, 0, 0, 0, 0, 0]
    soft_reset_pos_range: [-0.8, -0.8, 1.0, 0.8, 0.8, 1.0]
    soft_reset_ori_range: [0, 0, 0, 0, 0, 0]
    scale: [1.0, 1.0, 1.0]

  fluid_items:
    common:
    usd: ["$MAGICSIM_ASSETS/Object/Fluid/cube_fluid.usd","$MAGICSIM_ASSETS/Object/Fluid/sphere_fluid.usd","$MAGICSIM_ASSETS/Object/Fluid/cylinder_fluid.usd"]
    num_per_env: 1
    random: True
    interaction_with_object: False

    fluid_items_1:
      visual:
        scale: [1.0,1.0,1.0]
        container_scale: [1.0,1.0,1.0]
        visual_material:
          material_usd_folder: [
            "./Assets/Material/Base/Textiles/Linen_Beige.mdl",
            "./Assets/Material/Base/Textiles/Linen_White.mdl",
            "./Assets/Material/Base/Textiles/Linen_Blue.mdl",
            "./Assets/Material/Base/Textiles/Leather_Black.mdl",
            "./Assets/Material/Base/Textiles/Leather_Brown.mdl",
            "./Assets/Material/Base/Textiles/Leather_Black.mdl",
          ]

      # pos: [0.8, -1.0, 1.0]
      # ori: [0.0,0.0,0.0]
      physics:
        type: "fluid"
        particle_system:
          particle_contact_offset: 0.035
          contact_offset: 0.04
          rest_offset: 0.025
          fluid_rest_offset: 0.025
          solid_rest_offset: 0.025
          max_velocity: 2.5
          smoothing: True
          anisotropy: False
          isosurface: False

        particle_material:
          adhesion: 20.0
          adhesion_offset_scale: null
          cohesion: 10.0
          particle_adhesion_scale: null
          particle_friction_scale: null
          drag: null
          lift: null
          friction: 1.0
          damping: 200.0
          gravity_scale: 1.0
          viscosity: 200.0
          vorticity_confinement: null
          surface_tension: 0.0
          density: null
          cfl_coefficient: null

        fluid_volumn: 1
