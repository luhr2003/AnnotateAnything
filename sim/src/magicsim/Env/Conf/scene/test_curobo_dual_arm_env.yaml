background:
  intensity: [1000, 2000]
  # ... other dome light configurations can be added here if needed

  texture: [
    "$MAGICSIM_ASSETS/Background/champagne_castle_1_4k.hdr",
    "$MAGICSIM_ASSETS/Background/evening_road_01_4k.hdr",
    "$MAGICSIM_ASSETS/Background/kloofendal_48d_partly_cloudy_4k.hdr",
    "$MAGICSIM_ASSETS/Background/kloppenheim_02_4k.hdr",
    "$MAGICSIM_ASSETS/Background/mealie_road_4k.hdr",
    "$MAGICSIM_ASSETS/Background/moonlit_golf_4k.hdr",
    "$MAGICSIM_ASSETS/Background/noon_grass_4k.hdr",
    "$MAGICSIM_ASSETS/Background/qwantani_4k.hdr"
  ] # List of texture URLs for the dome light




light:

  light_1:

    types: ["Dome"]

    common:
      initial_pos_range: [-0.2, -0.2, 0, 0.2, 0.5, 0]
      initial_ori_range: [-30, -30, -30, 30, 30, 30]
      color_temperature_range: [3000, 9000]
      color_range: [[0.8, 0.8, 0.8], [1.2, 1.2, 1.2]]

    # --- Config of Different type of Lights ---
    Dome:
      intensity_range: [800, 1500]
    Rect:
      intensity_range: [2000, 5000]
      width_range: [1.0, 3.0]
      height_range: [1.0, 3.0]
    Distant:
      intensity_range: [2000, 5000]
      angle_range: [0.5, 2.0]
    Sphere:
      intensity_range: [5000, 10000]
      radius_range: [0.1, 0.5]
    Cylinder:
      intensity_range: [4000, 8000]
      radius_range: [0.1, 0.3]
      length_range: [1.0, 2.0]
    Disk:
      intensity_range: [6000, 12000]
      radius_range: [0.2, 0.8]

objects:
  common:
    # Initial position range (relative to environment offset)
    initial_pos_range: [0.3, -0.2, 0.3, 0.3, 0.2, 0.6]  # Format: [x_min, y_min, z_min, x_max, y_max, z_max]
    # Initial orientation range
    initial_ori_range: [0, 180, 0, 0, 180, 0]  # [min_rx, min_ry, min_rz, max_rx, max_ry, max_rz]
    scale: [1.0, 1.0, 1.0]

  # Red Cube for left arm (J1_6) target
  RedCube:
    common:
      primitive_scale: [0.05, 0.05, 0.05]
      # Initial position range (relative to environment offset)
      # Left arm target: positioned on the left side
      initial_pos_range: [0.1, -0.1, 0.3, 0.3, 0.1, 0.5]  # Format: [x_min, y_min, z_min, x_max, y_max, z_max]
      # Initial orientation range
      initial_ori_range: [0, 180, 180, 0, 180, 180]  # [min_rx, min_ry, min_rz, max_rx, max_ry, max_rz]
      scale: [0.05, 0.05, 0.05]
    usd: ["Cube"] # .usd => add reference to stage /// primitive => create
    num_per_env: 1
    random: True
    semantic_label:

    RedCube_1:
      visual:
        scale:
        visible:
        color: [1.0, 0.0, 0.0]  # Red color for left arm target
        size:
        visual_material:
          material_usd_folder:

      physics:
        type: "geometry" # dynamic, geometry
        mass:
        density:
        physics_material:
          static_friction:
          dynamic_friction:
          restitution:
        linear_velocity:
        angular_velocity:
        collision: False
        track_contact_forces:
        prepare_contact_sensor:
        disable_stablization:
        contact_filter_prim_paths_expr:

  # Green Cube for right arm (J2_6) target
  GreenCube:
    common:
      primitive_scale: [0.05, 0.05, 0.05]
      # Initial position range (relative to environment offset)
      # Right arm target: positioned on the right side
      initial_pos_range: [0.7, -0.1, 0.3, 0.8, 0.1, 0.5]  # Format: [x_min, y_min, z_min, x_max, y_max, z_max]
      # Initial orientation range
      initial_ori_range: [0, 0, 0, 0, 0, 0]  # [min_rx, min_ry, min_rz, max_rx, max_ry, max_rz]
      scale: [0.05, 0.05, 0.05]
    usd: ["Cube"] # .usd => add reference to stage /// primitive => create
    num_per_env: 1
    random: True
    semantic_label:

    GreenCube_1:
      visual:
        scale:
        visible:
        color: [0.0, 1.0, 0.0]  # Green color for right arm target
        size:
        visual_material:
          material_usd_folder:

      physics:
        type: "geometry" # dynamic, geometry
        mass:
        density:
        physics_material:
          static_friction:
          dynamic_friction:
          restitution:
        linear_velocity:
        angular_velocity:
        collision: False
        track_contact_forces:
        prepare_contact_sensor:
        disable_stablization:
        contact_filter_prim_paths_expr:
