objects:
  common:
    # Initial position range (relative to environment offset)
    initial_pos_range: [0.5, -0.2, 0.3, 0.5, 0.2, 0.6]  # Format: [x_min, y_min, z_min, x_max, y_max, z_max]
    # Position range for soft reset (relative to environment offset)
    soft_reset_pos_range: [0.5, -0.2, 0.3, 0.5, 0.2, 0.6]  # Random position range for soft reset
    # Initial orientation range
    initial_ori_range: [0, 180, 0, 0, 180, 0]  # [min_rx, min_ry, min_rz, max_rx, max_ry, max_rz]
    # Orientation range for soft reset
    soft_reset_ori_range: [-45, -45, -45, 45, 45, 45]
    scale: [1.0, 1.0, 1.0]

  Cube:
    common:
      # primitive_scale: [0.05, 0.05, 0.05]
      # Initial position range (relative to environment offset)
      initial_pos_range: [0.5, -0.2, 0.3, 0.5, 0.2, 0.6]  # Format: [x_min, y_min, z_min, x_max, y_max, z_max]
      # Position range for soft reset (relative to environment offset)
      soft_reset_pos_range: [0.5, -0.2, 0.3, 0.5, 0.2, 0.6]  # Random position range for soft reset
      # Initial orientation range
      initial_ori_range: [0, 180, 0, 0, 180, 0]  # [min_rx, min_ry, min_rz, max_rx, max_ry, max_rz]
      # Orientation range for soft reset
      soft_reset_ori_range: [-45, -45, -45, 45, 45, 45]
    usd: ["Cube"] # .usd => add reference to stage /// primitive => create
    num_per_env: 2
    random: True
    semantic_label:

    Cube_1:
      visual:
        scale: [0.05, 0.05, 0.05]
        visible:
        color: [1.0, 0.0, 0.0]
        size:
        visual_material:
          material_usd_folder:

      physics:
        type: "geometry" # dynamic, geometry
        mass:
        density:
        physics_material:
          static_friction:
          dynamic_friction:
          restitution:
        linear_velocity:
        angular_velocity:
        collision: False
        track_contact_forces:
        prepare_contact_sensor:
        disable_stablization:
        contact_filter_prim_paths_expr:

    Cube_2:
      pos: [0.25,0.05,0.0]
      visual:
        scale: [0.05, 0.05, 2.0]
        visible:
        color: [1.0, 0.0, 0.0]
        size:
        visual_material:
          material_usd_folder:
      physics:
        type: "geometry" # dynamic, geometry
        mass:
        density:
        physics_material:
          static_friction:
          dynamic_friction:
          restitution:
        linear_velocity:
        angular_velocity:
        collision: True
        track_contact_forces:
        prepare_contact_sensor:
        disable_stablization:
        contact_filter_prim_paths_expr:
