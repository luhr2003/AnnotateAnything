Franka: # This is the robot name
  name: "franka" # this is used for retreival articulation cfg
  type: "manipulator"
  common:
    # Initial position range (relative to environment offset)
    initial_pos_range: [-0.2, -0.7, 1.0, 0.2, -0.3, 1]  # Format: [x_min, y_min, z_min, x_max, y_max, z_max]
    # Position range for soft reset (relative to environment offset)
    soft_reset_pos_range: [-0.2, -0.7, 1.0, 0.2, -0.3, 1]  # Random position range for soft reset
    # Initial orientation range
    initial_ori_range: [-5, -5, -5, 5, 5, 5]  # [min_rx, min_ry, min_rz, max_rx, max_ry, max_rz]
    # Orientation range for soft reset
    soft_reset_ori_range: [-5, -5, -5, 5, 5, 5]
    # Initial joint position for the robot
    initial_joint_pos: {
      "panda_joint1": 0.0,
      "panda_joint2": -0.785,
      "panda_joint3": 0.0,
      "panda_joint4": -2.356,
      "panda_joint5": 0.0,
      "panda_joint6": 1.571,
      "panda_joint7": 0.785,
      "panda_finger_joint1": 0.04,
      "panda_finger_joint2": 0.04,
    }

  action: # This is used for action manager
    arm: "joint_pos" # ik_abs, joint_pos
    eef: "joint_pos" # joint pos


UR: # This is the robot name
  name: "UR10" # this is used for retreival articulation cfg
  type: "manipulator"
  common:
    # Initial position range (relative to environment offset)
    initial_pos_range: [-0.2, 0.3, 1.0, 0.2, 0.7, 1.0]  # Format: [x_min, y_min, z_min, x_max, y_max, z_max]
    # Position range for soft reset (relative to environment offset)
    soft_reset_pos_range: [-0.2, 0.3, 1.0, 0.2, 0.7, 1.0]  # Random position range for soft reset
    # Initial orientation range
    initial_ori_range: [-5, -5, -5, 5, 5, 5]  # [min_rx, min_ry, min_rz, max_rx, max_ry, max_rz]
    # Orientation range for soft reset
    soft_reset_ori_range: [-5, -5, -5, 5, 5, 5]
    # Initial joint position for the robot

  action: # This is used for action manager
    arm: "ik_abs" # ik_abs,
    eef: null # joint pos ik

