Franka1: # This is the robot name
  name: "franka" # this is used for retreival articulation cfg
  type: "manipulator"
  common:
    # Initial position range (relative to environment offset)
    initial_pos_range: [0, 0, 1, 0, 0, 1]  # Format: [x_min, y_min, z_min, x_max, y_max, z_max]

    # Initial orientation range
    initial_ori_range: [0, 0 , 90, 0, 0, 90]  # [min_rx, min_ry, min_rz, max_rx, max_ry, max_rz]

    initial_joint_pos: {
      "panda_joint1": 0.0,
      "panda_joint2": -1.3,
      "panda_joint3": 0.0,
      "panda_joint4": -2.5,
      "panda_joint5": 0.0,
      "panda_joint6": 1.0,
      "panda_joint7": 0.0,
      "panda_finger_joint1": 0.04,
      "panda_finger_joint2": 0.04,
    }

  action: # This is used for action manager
    arm: joint_pos # ik_abs, ik_rel, osc
    eef: binary # joint pos

  planner:
    arm:
      type: "curobo"
    eef:
      type: "default"
