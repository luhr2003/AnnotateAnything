      "L_joint6": 0.0,
      "L_joint7": 0.022,
      "L_joint8": 0.022,
      "R_joint1": 0.0,
      "R_joint2": -0.5,
      "R_joint3": 1.0,
      "R_joint4": 0.0,
      "R_joint5": 0.0,
      "R_joint6": 0.0,
      "R_joint7": 0.022,
      "R_joint8": 0.022,
