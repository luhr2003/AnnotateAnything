SO101: # This is the robot name
  name: "so101" # this is used for retrieval articulation cfg
  type: "manipulator"
  common:
    initial_pos_range: [0, 0, 1.0, 0, 0, 1.0]
    initial_ori_range: [0, 0, 0, 0, 0, 0]
    initial_joint_pos: {
      "shoulder_pan": 0.0,
      "shoulder_lift": -0.5,
      "elbow_flex": 0.8,
      "wrist_flex": 0.0,
      "wrist_roll": 0.0,
      "gripper": 0.0,
    }

  action: # arm options: joint_pos, ik_curobo
    arm: joint_pos
    eef: joint_pos

  reset: default
  randomize_joint:
    mean: 0.0
    std: 3
