G1_Dex1_1:  # robot name
  name: "g1_dex1"  # ROBOT_DICT key → G1_Dex1Cfg
  type: "humanoid"
  common:
    initial_pos_range: [0, 0, 0.8, 0, 0, 0.8]
    initial_ori_range: [0, 0, 0, 0, 0, 0]

  action:
    base_action: wbc       # Homie WBC policy (g1_dex1 variant — 33-joint table)
    arm_action: ik_abs     # Pink IK on *_hand_palm_link, 14-dim (2 × xyz+xyzw)
    eef_action: binary     # 2-dim, one float per side (>=0 open / <0 close)

  planner:
    # Use 'default' so the test driver passes raw 7-dim WBC commands directly
    # (no p_controller preprocessing). For nav-from-pelvis-pose use 'p_controller'.
    body:
      type: default
    arm:
      type: default
    eef:
      type: default

  reset: default
  randomize_joint:
    mean: 0.0
    std: 0.1
