LocoLift:
  robot_id: 0
  obj_type: "rigid"
  obj_name: "bin"
  obj_id: 0
  # Longer init so the bin has time to fully settle on the table before
  # Lift.reset snapshots its pose to build the squeeze targets. If
  # targets are captured mid-fall, the wrist-world-z drifts with the bin.
  init_limit: 300
  max_attempt: 2

LocoBox:
  robot_id: 0
  obj_type: "rigid"
  obj_name: "bin"
  obj_id: 0
  # 50 ticks (~1s at 50 Hz ctrl) is plenty for the cube primitive to
  # settle on the cube ground — it spawns flush at z≈0.13.
  init_limit: 50
  max_attempt: 2

